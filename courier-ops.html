<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CourierOps — Operations Management System</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: { extend: { colors: { primary:'#2563EB', success:'#10B981', warning:'#F59E0B', danger:'#EF4444' } } }
}
</script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f1f5f9}

::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:4px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

  {id:'TSK006',customer:'City Pharma',  pickup:'Egmore, Chennai',                delivery:'Kodambakkam, Chennai',        contact:'9876500006',pkg:'Medical supplies',  emp:'EMP002',vehicle:'TN09CD5678',priority:'High',  status:'Accepted',           eta:'14:00',created:'11:30'},

const VEHICLES = [
  {id:'VH001',number:'TN09AB1234',type:'Bike', status:'Assigned',   emp:'Rajesh Kumar', rc:'2026-12-31',ins:'2026-06-30',permit:'2026-03-15',poll:'2025-12-31'},

  {id:'VH003',number:'TN09EF9012',type:'Van',  status:'Assigned',   emp:'Arjun Nair',   rc:'2027-01-10',ins:'2026-11-30',permit:'2026-10-25',poll:'2026-05-15'},
  {id:'VH004',number:'TN09GH3456',type:'Truck',status:'Available',  emp:null,           rc:'2026-08-15',ins:'2026-07-20',permit:'2026-06-30',poll:'2026-02-28'},
  {id:'VH005',number:'TN09IJ7890',type:'Bike', status:'Maintenance',emp:null,           rc:'2025-11-30',ins:'2025-10-15',permit:'2025-09-20',poll:'2025-08-10'},
  {id:'VH006',number:'TN09GH1111',type:'Bike', status:'Assigned',   emp:'Meena Selvam', rc:'2027-03-10',ins:'2026-12-10',permit:'2026-11-05',poll:'2026-08-20'},

/* ─── SHARED UTILS ──────────────────────────────────────────── */
const statusBadge = {
  'On Delivery':'bg-blue-100 text-blue-700','In Office':'bg-green-100 text-green-700',
  'Available':'bg-emerald-100 text-emerald-700','Break':'bg-yellow-100 text-yellow-700',
  'Offline':'bg-gray-100 text-gray-500','In Transit':'bg-blue-100 text-blue-700',
  'Pickup Started':'bg-indigo-100 text-indigo-700','Assigned':'bg-purple-100 text-purple-700',
  'Accepted':'bg-cyan-100 text-cyan-700','Delivery Completed':'bg-green-100 text-green-700',
  'Pickup Completed':'bg-teal-100 text-teal-700','Delayed':'bg-red-100 text-red-600',
  'Cancelled':'bg-gray-100 text-gray-500','Maintenance':'bg-yellow-100 text-yellow-700',
  'Out of Service':'bg-red-100 text-red-600','High':'bg-red-100 text-red-600',
  'Normal':'bg-blue-100 text-blue-700','Low':'bg-gray-100 text-gray-500',
};

const Badge = ({label})=>(
  <span className={`inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-semibold ${statusBadge[label]||'bg-gray-100 text-gray-500'}`}>{label}</span>
);

const Avatar = ({initials,size='md'})=>{
  const s = size==='lg'?'w-14 h-14 text-xl':size==='sm'?'w-7 h-7 text-xs':'w-9 h-9 text-sm';
  return <div className={`${s} bg-blue-100 text-blue-700 font-bold rounded-xl flex items-center justify-center flex-shrink-0`}>{initials}</div>;
};

const StatCard = ({label,value,sub,icon,accent='blue'})=>{
  const acc={blue:'border-l-blue-500 bg-blue-50',green:'border-l-green-500 bg-green-50',yellow:'border-l-yellow-500 bg-yellow-50',red:'border-l-red-500 bg-red-50',purple:'border-l-purple-500 bg-purple-50'};
  return (
    <div className={`rounded-xl p-4 border-l-4 ${acc[accent]||acc.blue} border border-gray-100 bg-white`}>
      <div className="flex justify-between items-start mb-1">
        <span className="text-xs text-gray-500 font-medium uppercase tracking-wide">{label}</span>
        <span className="text-lg">{icon}</span>
      </div>
      <div className="text-2xl font-bold text-gray-800">{value}</div>
      {sub && <div className="text-xs text-gray-400 mt-0.5">{sub}</div>}
    </div>
  );
};

const Modal = ({title,onClose,children})=>(
  <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
    <div className="bg-white rounded-2xl w-full max-w-lg shadow-2xl">
      <div className="flex items-center justify-between p-5 border-b border-gray-100">
        <h3 className="font-bold text-lg text-gray-800">{title}</h3>
        <button onClick={onClose} className="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-gray-100 text-gray-400 hover:text-gray-600">✕</button>
      </div>
      <div className="p-5">{children}</div>
    </div>
  </div>
);

const Field = ({label,type='text',placeholder,options})=>(
  <div>
    <label className="block text-xs font-semibold text-gray-600 mb-1.5 uppercase tracking-wide">{label}</label>
    {options
      ? <select className="w-full px-3 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
          {options.map(o=><option key={o}>{o}</option>)}
        </select>
      : <input type={type} placeholder={placeholder} className="w-full px-3 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
    }
  </div>
);

/* ─── LOGIN ─────────────────────────────────────────────────── */
const Login = ({onLogin})=>{
  const [role,setRole]=useState('admin');
  const [user,setUser]=useState('');
  const [pin,setPin]=useState('');
  return (
    <div className="min-h-screen bg-gradient-to-br from-blue-700 via-blue-600 to-indigo-700 flex items-center justify-center p-4">
      <div className="w-full max-w-sm">
        <div className="text-center mb-8">
          <div className="inline-flex items-center justify-center w-16 h-16 bg-white/20 rounded-2xl backdrop-blur mb-4">
            <span className="text-3xl">📦</span>
          </div>
          <h1 className="text-3xl font-bold text-white">CourierOps</h1>
          <p className="text-blue-200 mt-1 text-sm">Operations Management System</p>
        </div>
        <div className="bg-white rounded-2xl shadow-2xl p-6">
          <div className="mb-5">
            <p className="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">Login As</p>
            <div className="grid grid-cols-2 gap-2">
              {[{v:'admin',label:'🔐 Admin'},{v:'employee',label:'👤 Employee'}].map(({v,label})=>(
                <button key={v} onClick={()=>setRole(v)} className={`py-3 rounded-xl font-semibold text-sm transition-all border-2 ${role===v?'border-blue-600 bg-blue-50 text-blue-700':'border-gray-200 text-gray-500 hover:border-gray-300'}`}>{label}</button>
              ))}
            </div>
          </div>
          <div className="space-y-3 mb-5">
            <div>
              <label className="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">Username / Employee ID</label>
              <input value={user} onChange={e=>setUser(e.target.value)} placeholder={role==='admin'?'admin':'EMP001'} className="w-full px-4 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
            </div>
            <div>
              <label className="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">PIN / Password</label>
              <input type="password" value={pin} onChange={e=>setPin(e.target.value)} placeholder="••••••" className="w-full px-4 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
            </div>
          </div>
          <button onClick={()=>(user&&pin)?onLogin(role):alert('Enter credentials')} className="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition-colors">
            Sign In →
          </button>
          <p className="text-center text-xs text-gray-400 mt-3">Demo: any username + any PIN</p>
        </div>
      </div>
    </div>
  );
};

/* ─── ADMIN SIDEBAR ─────────────────────────────────────────── */
const Sidebar = ({active,set,onLogout})=>{
  const [mini,setMini]=useState(false);
  const nav=[
    {id:'dashboard',icon:'⬛',label:'Dashboard'},
    {id:'map',       icon:'🗺️',label:'Live Map'},
    {id:'employees', icon:'👥',label:'Employees'},
    {id:'tasks',     icon:'📋',label:'Tasks'},
    {id:'vehicles',  icon:'🚗',label:'Vehicles'},
    {id:'attendance',icon:'🕐',label:'Attendance'},
    {id:'reports',   icon:'📈',label:'Reports'},
  ];
  return (
    <div className={`flex flex-col bg-slate-900 text-white transition-all duration-200 ${mini?'w-14':'w-56'} min-h-screen flex-shrink-0`}>
      <div className={`p-3 border-b border-slate-700 flex items-center ${mini?'justify-center':'justify-between'}`}>
        {!mini&&<div><div className="font-bold text-sm">CourierOps</div><div className="text-slate-400 text-xs">Admin</div></div>}
        <button onClick={()=>setMini(!mini)} className="w-7 h-7 flex items-center justify-center rounded-lg hover:bg-slate-700 text-slate-400 hover:text-white text-sm">{mini?'›':'‹'}</button>
      </div>
      <nav className="flex-1 p-2 space-y-0.5 mt-1">
        {nav.map(n=>(
          <button key={n.id} onClick={()=>set(n.id)} title={mini?n.label:''} className={`w-full flex items-center gap-3 px-2.5 py-2 rounded-lg text-sm font-medium transition-all ${active===n.id?'bg-blue-600 text-white':'text-slate-400 hover:bg-slate-800 hover:text-white'}`}>
            <span className="text-base flex-shrink-0">{n.icon}</span>
            {!mini&&<span>{n.label}</span>}
          </button>
        ))}
      </nav>
      <div className="p-2 border-t border-slate-700">
        <button onClick={onLogout} title={mini?'Logout':''} className="w-full flex items-center gap-3 px-2.5 py-2 rounded-lg text-sm text-slate-400 hover:bg-slate-800 hover:text-red-400">
          <span className="text-base">🚪</span>{!mini&&<span>Logout</span>}
        </button>
      </div>
    </div>
  );
};

/* ─── ADMIN DASHBOARD ───────────────────────────────────────── */
const Dashboard = ()=>{
  const stats=[
    {label:'Total Employees',value:24,icon:'👥',accent:'blue'},
    {label:'On Delivery',    value:12,icon:'🚚',accent:'blue'},
    {label:'In Office',      value:6, icon:'🏢',accent:'green'},
    {label:'Available',      value:4, icon:'✅',accent:'green'},
    {label:'Pending Tasks',  value:8, icon:'⏳',accent:'yellow'},
    {label:'Active Tasks',   value:12,icon:'▶️',accent:'blue'},
    {label:'Completed Today',value:34,icon:'✅',accent:'green'},
    {label:'Delayed',        value:3, icon:'⚠️',accent:'red'},
    {label:'Total Vehicles', value:15,icon:'🚗',accent:'purple'},

  ];

    {t:'14:22',msg:'TSK001 — Rajesh Kumar delivered at Guindy ✅',type:'green'},
    {t:'14:10',msg:'TSK006 — New task assigned to Arjun Nair',type:'blue'},
    {t:'13:55',msg:'Vehicle TN09IJ7890 moved to Maintenance',type:'yellow'},

    {t:'13:20',msg:'Priya Sharma checked in at 09:28 AM',type:'green'},

  const typeText={green:'text-green-700',blue:'text-blue-700',yellow:'text-yellow-700',red:'text-red-700'};
  return (
    <div className="p-6 space-y-6">
      <div>
        <h2 className="text-xl font-bold text-gray-800">Operations Dashboard</h2>
        <p className="text-gray-400 text-sm">Tuesday 16 June 2026 · Real-time</p>
      </div>
      <div className="grid grid-cols-2 md:grid-cols-5 gap-3">
        {stats.map((s,i)=><StatCard key={i} {...s}/>)}

      <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
        <div className="bg-white rounded-xl border border-gray-100 shadow-sm p-4">
          <h3 className="font-semibold text-gray-800 mb-3">Active Deliveries</h3>
          <div className="space-y-2">
            {TASKS.filter(t=>['In Transit','Pickup Started','Accepted'].includes(t.status)).map(t=>{
              const e=EMPLOYEES.find(x=>x.id===t.emp);
              return (
                <div key={t.id} className="flex items-center gap-3 p-3 rounded-lg bg-gray-50 hover:bg-blue-50 transition-colors">
                  <div className="w-8 h-8 bg-blue-600 text-white rounded-lg flex items-center justify-center text-xs font-bold">{t.id.replace('TSK','')}</div>
                  <div className="flex-1 min-w-0">
                    <div className="text-sm font-semibold text-gray-800 truncate">{t.customer}</div>
                    <div className="text-xs text-gray-400 truncate">→ {t.delivery}</div>
                  </div>
                  <div className="text-right flex-shrink-0">
                    <Badge label={t.status}/>
                    <div className="text-xs text-gray-400 mt-0.5">ETA {t.eta}</div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
        <div className="bg-white rounded-xl border border-gray-100 shadow-sm p-4">
          <h3 className="font-semibold text-gray-800 mb-3">Activity Feed</h3>
          <div className="space-y-2">
            {activity.map((a,i)=>(
              <div key={i} className={`flex gap-3 p-2.5 rounded-lg border-l-4 ${typeRing[a.type]}`}>
                <span className="text-xs text-gray-400 flex-shrink-0 pt-0.5 w-10">{a.t}</span>
                <span className={`text-xs ${typeText[a.type]}`}>{a.msg}</span>
              </div>
            ))}
          </div>
        </div>
      </div>
      <div className="bg-white rounded-xl border border-gray-100 shadow-sm p-4">
        <h3 className="font-semibold text-gray-800 mb-3">Employee Overview</h3>
        <div className="overflow-x-auto">
          <table className="w-full text-sm">
            <thead><tr className="border-b border-gray-100 text-xs text-gray-400 uppercase tracking-wide">
              <th className="text-left pb-2 font-semibold">Employee</th>
              <th className="text-left pb-2 font-semibold">Status</th>
              <th className="text-left pb-2 font-semibold hidden md:table-cell">Vehicle</th>
              <th className="text-left pb-2 font-semibold hidden md:table-cell">Department</th>
            </tr></thead>
            <tbody className="divide-y divide-gray-50">
              {EMPLOYEES.map(e=>(
                <tr key={e.id} className="hover:bg-gray-50">
                  <td className="py-2.5"><div className="flex items-center gap-2"><Avatar initials={e.avatar} size="sm"/><div><div className="font-medium text-gray-800">{e.name}</div><div className="text-xs text-gray-400">{e.id}</div></div></div></td>
                  <td className="py-2.5"><Badge label={e.status}/></td>
                  <td className="py-2.5 text-gray-500 hidden md:table-cell">{e.vehicle||'—'}</td>
                  <td className="py-2.5 text-gray-500 hidden md:table-cell">{e.dept}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>

};

/* ─── LIVE MAP ──────────────────────────────────────────────── */
const LiveMap = ()=>{
  const [sel,setSel]=useState(null);
  const toSvg=(lat,lng)=>({
    x:Math.max(30,Math.min(470,((lng-80.24)/0.09)*500)),
    y:Math.max(30,Math.min(330,((13.11-lat)/0.09)*360))
  });
  const sColor={'On Delivery':'#2563EB','In Office':'#10B981','Available':'#10B981','Break':'#F59E0B'};
  const active=EMPLOYEES.filter(e=>e.lat);
  return (
    <div className="p-6 space-y-4">
      <div><h2 className="text-xl font-bold text-gray-800">Live Operations Map</h2><p className="text-gray-400 text-sm">Real-time tracking · Updates every 15s</p></div>
      <div className="grid grid-cols-1 lg:grid-cols-4 gap-4">
        <div className="lg:col-span-3 bg-white rounded-xl border border-gray-100 shadow-sm overflow-hidden">
          <div className="bg-blue-50 border-b border-blue-100 px-4 py-2 flex items-center justify-between">
            <span className="text-sm font-semibold text-blue-700">Chennai Region</span>
            <div className="flex gap-4 text-xs text-gray-500">
              <span className="flex items-center gap-1"><span className="w-2 h-2 rounded-full bg-blue-600 inline-block"></span>On Delivery</span>
              <span className="flex items-center gap-1"><span className="w-2 h-2 rounded-full bg-green-500 inline-block"></span>Available / Office</span>
              <span className="flex items-center gap-1"><span className="w-2 h-2 rounded-full bg-yellow-500 inline-block"></span>Break</span>
            </div>
          </div>
          <svg width="100%" viewBox="0 0 500 370" className="map-bg" style={{display:'block'}}>
            <line x1="50" y1="185" x2="450" y2="185" stroke="#bfdbfe" strokeWidth="4"/>
            <line x1="250" y1="20"  x2="250" y2="350" stroke="#bfdbfe" strokeWidth="4"/>
            <line x1="60"  y1="80"  x2="440" y2="300" stroke="#bfdbfe" strokeWidth="2"/>
            <line x1="440" y1="80"  x2="60"  y2="300" stroke="#bfdbfe" strokeWidth="2"/>
            <line x1="100" y1="185" x2="400" y2="100" stroke="#c7d2fe" strokeWidth="1.5"/>
            {[['Perambur',80,70],['T Nagar',340,70],['Tambaram',60,310],['Velachery',340,310],['Adyar',350,230],['Guindy',160,250],['Egmore',200,130],['Porur',80,220]].map(([n,x,y])=>(
              <text key={n} x={x} y={y} fill="#94a3b8" fontSize="10" fontFamily="sans-serif">{n}</text>
            ))}
            <circle cx="250" cy="185" r="14" fill="#2563EB" opacity="0.15"/>
            <circle cx="250" cy="185" r="7"  fill="#2563EB"/>
            <text x="260" y="178" fill="#1d4ed8" fontSize="9" fontFamily="sans-serif" fontWeight="bold">HQ</text>
            {active.map(e=>{
              const {x,y}=toSvg(e.lat,e.lng);
              const c=sColor[e.status]||'#64748b';
              const s=sel?.id===e.id;
              return (
                <g key={e.id} onClick={()=>setSel(s?null:e)} style={{cursor:'pointer'}}>
                  {s&&<circle cx={x} cy={y} r="22" fill={c} opacity="0.15"/>}
                  <circle cx={x} cy={y} r={s?12:9} fill={c}/>
                  <text x={x} y={y+3.5} textAnchor="middle" fill="white" fontSize="7" fontFamily="sans-serif" fontWeight="bold">{e.avatar}</text>
                  {s&&<text x={x} y={y-18} textAnchor="middle" fill="#1e293b" fontSize="9" fontFamily="sans-serif" fontWeight="bold">{e.name}</text>}
                </g>
              );
            })}
          </svg>
        </div>
        <div className="space-y-2">
          <p className="text-xs font-semibold text-gray-500 uppercase tracking-wide">Field Staff</p>
          {active.map(e=>(
            <button key={e.id} onClick={()=>setSel(sel?.id===e.id?null:e)} className={`w-full text-left bg-white rounded-xl p-3 border shadow-sm transition-all ${sel?.id===e.id?'border-blue-400':'border-gray-100 hover:border-gray-200'}`}>

/* ─── EMPLOYEE TASK WORKFLOW ────────────────────────────────── */
const Workflow = ({task,onBack})=>{
  const [step,setStep]=useState(1);
  const [vType,setVType]=useState(null);
  const [role,setRole]=useState(null);
  const [photo,setPhoto]=useState(false);
  const steps=['Accept','Vehicle','Pickup','Delivery','Done'];
  const StepBar=()=>(
    <div className="flex items-center justify-center gap-1 py-4">
      {steps.map((s,i)=>(
        <div key={s} className="flex items-center">
          <div className={`w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold transition-all ${i+1<step?'bg-green-500 text-white':i+1===step?'bg-blue-600 text-white':'bg-gray-200 text-gray-400'}`}>{i+1<step?'✓':i+1}</div>
          {i<steps.length-1&&<div className={`w-6 h-0.5 ${i+1<step?'bg-green-400':'bg-gray-200'}`}/>}
        </div>
      ))}
    </div>
  );
  return (
    <div className="flex flex-col min-h-screen bg-gray-50">
      <div className="bg-white border-b px-4 py-3 flex items-center gap-3">
        <button onClick={onBack} className="text-blue-600 text-sm font-medium">← Back</button>
        <div><div className="font-semibold text-gray-800 text-sm">{task.id}</div><div className="text-xs text-gray-400">{task.customer}</div></div>
      </div>
      <div className="px-4 pb-24">
        <StepBar/>
        {step===1&&(
          <div className="space-y-3">
            <div className="bg-white rounded-2xl p-4 shadow-sm">
              <h3 className="font-bold text-lg text-gray-800 mb-3">New Task Assigned 📦</h3>
              <div className="space-y-2 text-sm">
                <div className="flex gap-3 p-3 bg-green-50 rounded-xl"><span className="text-green-600 text-lg">↑</span><div><div className="font-medium text-gray-700">Pickup</div><div className="text-gray-500">{task.pickup}</div></div></div>
                <div className="flex gap-3 p-3 bg-red-50 rounded-xl"><span className="text-red-400 text-lg">↓</span><div><div className="font-medium text-gray-700">Delivery</div><div className="text-gray-500">{task.delivery}</div></div></div>
                <div className="grid grid-cols-2 gap-2 mt-2">
                  <div className="bg-gray-50 rounded-xl p-3"><div className="text-xs text-gray-400">Package</div><div className="font-medium text-gray-800 text-sm">{task.pkg}</div></div>
                  <div className="bg-gray-50 rounded-xl p-3"><div className="text-xs text-gray-400">Priority</div><Badge label={task.priority}/></div>
                </div>
              </div>
            </div>
            <button onClick={()=>setStep(2)} className="w-full py-4 bg-blue-600 text-white rounded-2xl font-bold text-base hover:bg-blue-700 active:scale-95 transition-all">✅ Accept Task</button>
            <button className="w-full py-3 border-2 border-gray-200 text-gray-500 rounded-2xl font-medium text-sm">❌ Decline</button>
          </div>
        )}
        {step===2&&(
          <div className="space-y-3">
            <div className="text-center mb-2"><h3 className="font-bold text-xl text-gray-800">Select Vehicle</h3><p className="text-gray-400 text-sm">Choose your vehicle for this delivery</p></div>
            {[{t:'Bike',i:'🏍️',d:'Light packages up to 20kg'},{t:'Van',i:'🚐',d:'Medium capacity up to 500kg'},{t:'Truck',i:'🚛',d:'Heavy loads & bulk shipments'}].map(v=>(
              <button key={v.t} onClick={()=>{setVType(v.t);setRole(null);}} className={`w-full flex items-center gap-4 p-4 rounded-2xl border-2 transition-all ${vType===v.t?'border-blue-600 bg-blue-50':'border-gray-200 bg-white hover:border-gray-300'}`}>
                <span className="text-3xl">{v.i}</span>
                <div className="text-left"><div className="font-semibold text-gray-800">{v.t}</div><div className="text-xs text-gray-400">{v.d}</div></div>
                {vType===v.t&&<span className="ml-auto text-blue-600 text-xl">✓</span>}
              </button>
            ))}
            {vType==='Bike'&&<div className="bg-blue-50 rounded-2xl p-3 text-xs text-blue-700"><div className="font-semibold mb-1">🏍️ TN09AB1234 — Assigned to you</div><div className="flex gap-4"><span>✅ Insurance valid</span><span>✅ RC valid</span><span>✅ Permit valid</span></div></div>}
            {vType==='Truck'&&(
              <div className="space-y-2">
                <p className="text-sm font-semibold text-gray-700">Your role:</p>
                <div className="grid grid-cols-2 gap-2">
                  {['Driver','Co-Driver'].map(r=>(
                    <button key={r} onClick={()=>setRole(r)} className={`py-3 rounded-xl border-2 font-semibold text-sm transition-all ${role===r?'border-blue-600 bg-blue-50 text-blue-700':'border-gray-200 text-gray-500'}`}>{r==='Driver'?'🚛':'🪑'} {r}</button>
                  ))}
                </div>
                {role==='Co-Driver'&&<div className="bg-yellow-50 border border-yellow-200 rounded-xl p-3 text-xs text-yellow-700">Assigned Driver: <strong>Arjun Nair</strong> · TN09EF9012</div>}
              </div>
            )}
            <button disabled={!vType||(vType==='Truck'&&!role)} onClick={()=>{setPhoto(false);setStep(3);}} className={`w-full py-4 rounded-2xl font-bold text-base transition-all ${(vType&&(vType!=='Truck'||role))?'bg-blue-600 text-white hover:bg-blue-700':'bg-gray-200 text-gray-400 cursor-not-allowed'}`}>Continue →</button>
          </div>
        )}
        {step===3&&(
          <div className="space-y-3">
            <div className="text-center mb-2"><h3 className="font-bold text-xl text-gray-800">Pickup Process</h3></div>
            <div className="bg-white rounded-2xl p-4 shadow-sm flex gap-3 items-start">
              <div className="w-10 h-10 bg-green-100 rounded-xl flex items-center justify-center text-green-600 text-xl flex-shrink-0">↑</div>
              <div><div className="font-semibold text-gray-800">Pickup Address</div><div className="text-sm text-gray-500">{task.pickup}</div><div className="text-xs text-gray-400 mt-1">📞 {task.contact}</div></div>
            </div>
            <div className="bg-amber-50 border-2 border-amber-200 rounded-2xl p-3 text-sm text-amber-700">📍 GPS location & timestamp will be captured automatically when you start pickup.</div>
            <div className="bg-white rounded-2xl p-4 shadow-sm">
              <div className="font-semibold text-gray-800 mb-3 text-sm">📸 Mandatory: Pickup Photo</div>
              <div className={`border-2 border-dashed rounded-xl p-6 text-center transition-all ${photo?'border-green-400 bg-green-50':'border-gray-300 hover:border-blue-300 cursor-pointer'}`} onClick={()=>!photo&&setPhoto(true)}>
                {photo?<div className="text-green-600 text-sm font-medium">✅ Photo captured · 14:22 · GPS logged</div>:<div><div className="text-2xl mb-1">📷</div><div className="text-blue-600 text-sm font-medium">Tap to capture pickup photo</div></div>}
              </div>
            </div>
            <button disabled={!photo} onClick={()=>{setPhoto(false);setStep(4);}} className={`w-full py-4 rounded-2xl font-bold text-base transition-all ${photo?'bg-blue-600 text-white hover:bg-blue-700':'bg-gray-200 text-gray-400 cursor-not-allowed'}`}>🚀 Start Transit</button>
          </div>
        )}
        {step===4&&(
          <div className="space-y-3">
            <div className="bg-blue-600 rounded-2xl p-4 text-white">
              <div className="text-xs text-blue-200 mb-1">🟢 In Transit · GPS Tracking Active</div>
              <div className="font-bold text-base">{task.customer}</div>
              <div className="text-sm text-blue-100 mt-0.5">📍 {task.delivery}</div>
              <div className="mt-3"><div className="w-full bg-blue-500 rounded-full h-1.5"><div className="bg-white h-1.5 rounded-full" style={{width:'62%'}}></div></div><div className="flex justify-between text-xs text-blue-200 mt-1"><span>8.2 km remaining</span><span>ETA {task.eta}</span></div></div>
            </div>
            <div className="bg-white rounded-2xl p-4 shadow-sm">
              <div className="font-semibold text-gray-800 mb-3 text-sm">📸 Mandatory: Delivery Photo</div>
              <div className={`border-2 border-dashed rounded-xl p-6 text-center transition-all ${photo?'border-green-400 bg-green-50':'border-gray-300 hover:border-blue-300 cursor-pointer'}`} onClick={()=>!photo&&setPhoto(true)}>
                {photo?<div className="text-green-600 text-sm font-medium">✅ Delivery photo captured · GPS logged</div>:<div><div className="text-2xl mb-1">📷</div><div className="text-blue-600 text-sm font-medium">Tap to take delivery photo</div></div>}
              </div>
            </div>
            <button disabled={!photo} onClick={()=>setStep(5)} className={`w-full py-4 rounded-2xl font-bold text-base transition-all ${photo?'bg-green-500 text-white hover:bg-green-600':'bg-gray-200 text-gray-400 cursor-not-allowed'}`}>✅ Complete Delivery</button>
          </div>
        )}
        {step===5&&(
          <div className="space-y-4 text-center">
            <div className="py-6"><div className="w-24 h-24 bg-green-100 rounded-full flex items-center justify-center text-5xl mx-auto mb-4">✅</div><h3 className="font-bold text-2xl text-gray-800">Delivery Complete!</h3><p className="text-gray-400 mt-1 text-sm">{task.id} has been completed successfully</p></div>
            <div className="bg-white rounded-2xl p-4 shadow-sm text-left">
              <div className="grid grid-cols-2 gap-3 text-sm">
                <div className="bg-gray-50 rounded-xl p-3"><div className="text-xs text-gray-400">Distance</div><div className="font-bold text-gray-800">12.4 km</div></div>
                <div className="bg-gray-50 rounded-xl p-3"><div className="text-xs text-gray-400">Duration</div><div className="font-bold text-gray-800">1h 22m</div></div>
                <div className="bg-gray-50 rounded-xl p-3"><div className="text-xs text-gray-400">Completed At</div><div className="font-bold text-gray-800">14:22 PM</div></div>
                <div className="bg-gray-50 rounded-xl p-3"><div className="text-xs text-gray-400">Status</div><Badge label="Delivery Completed"/></div>
              </div>
            </div>
            <button onClick={onBack} className="w-full py-4 bg-blue-600 text-white rounded-2xl font-bold hover:bg-blue-700">← Back to My Tasks</button>
          </div>
        )}
      </div>
    </div>
  );
};

/* ─── EMPLOYEE PORTAL ───────────────────────────────────────── */
const Employee = ({onLogout})=>{
  const [sec,setSec]=useState('home');
  const [wfTask,setWfTask]=useState(null);
  const me=EMPLOYEES[0];
  const myT=TASKS.filter(t=>t.emp===me.id);
  const pending=myT.filter(t=>t.status==='Assigned');
  const active=myT.filter(t=>['In Transit','Pickup Started','Accepted'].includes(t.status));
  const done=myT.filter(t=>t.status==='Delivery Completed');

  if(wfTask) return <Workflow task={wfTask} onBack={()=>setWfTask(null)}/>;

  const Home=()=>(
    <div className="pb-4">
      <div className="bg-gradient-to-br from-blue-600 to-blue-800 text-white p-5">
        <div className="flex items-center gap-3 mb-4">
          <div className="w-14 h-14 bg-white/20 rounded-2xl flex items-center justify-center text-xl font-bold backdrop-blur">{me.avatar}</div>
          <div><div className="font-bold text-lg">{me.name}</div><div className="text-blue-200 text-sm">{me.role} · {me.id}</div><div className="mt-1"><span className="text-xs bg-white/20 px-2 py-0.5 rounded-full border border-white/30">🟢 On Delivery</span></div></div>
        </div>
        <div className="grid grid-cols-4 gap-2">
          {[[myT.length,'Total','📦'],[pending.length,'Pending','⏳'],[active.length,'Active','▶️'],[done.length,'Done','✅']].map(([v,l,i])=>(
            <div key={l} className="bg-white/15 backdrop-blur rounded-xl p-2.5 text-center"><div className="text-lg">{i}</div><div className="font-bold text-lg">{v}</div><div className="text-xs text-blue-200">{l}</div></div>
          ))}
        </div>
      </div>
      <div className="p-4 space-y-4">
        {active.length>0&&(
          <div>
            <p className="text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Active Task</p>
            {active.map(t=>(
              <div key={t.id} className="bg-white rounded-2xl shadow-sm border border-blue-100 overflow-hidden">
                <div className="bg-blue-600 px-4 py-2 flex justify-between items-center"><span className="text-white text-xs font-mono">{t.id}</span><Badge label={t.status}/></div>
                <div className="p-4">
                  <div className="font-semibold text-gray-800 mb-2">{t.customer}</div>
                  <div className="text-xs text-gray-500 space-y-1 mb-3">
                    <div><span className="text-green-500">↑</span> {t.pickup}</div>
                    <div><span className="text-red-400">↓</span> {t.delivery}</div>
                  </div>
                  <button onClick={()=>setWfTask(t)} className="w-full py-2.5 bg-blue-600 text-white rounded-xl text-sm font-bold hover:bg-blue-700">Continue Task →</button>
                </div>
              </div>
            ))}
          </div>
        )}
        <div>
          <p className="text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">My Vehicle</p>
          <div className="bg-white rounded-2xl p-3 shadow-sm flex items-center gap-3">
            <span className="text-3xl">🏍️</span>
            <div><div className="font-semibold text-gray-800">{me.vehicle}</div><div className="text-xs text-gray-400">Bike · All docs valid</div></div>
            <span className="ml-auto bg-green-100 text-green-700 text-xs px-2.5 py-1 rounded-lg font-semibold">Active</span>
          </div>
        </div>
        <div>
          <p className="text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Today's Timeline</p>
          <div className="space-y-0">
            {[
              {t:'09:28',e:'Checked in to office',i:'🏢',done:true},
              {t:'10:00',e:'Task TSK004 assigned — Fresh Mart',i:'📦',done:true},
              {t:'10:30',e:'Pickup from Adyar',i:'↑',done:true},
              {t:'11:45',e:'Delivered at Velachery ✅',i:'✅',done:true},
              {t:'13:00',e:'Task TSK001 — ABC Pvt Ltd',i:'📦',done:false},
              {t:'14:30',e:'Expected delivery at Guindy',i:'⏳',done:false},
            ].map((item,i)=>(
              <div key={i} className="flex gap-3">
                <div className="flex flex-col items-center">
                  <div className={`w-8 h-8 rounded-full flex items-center justify-center text-xs flex-shrink-0 ${item.done?'bg-blue-600 text-white':'bg-gray-200 text-gray-400'}`}>{item.i}</div>
                  {i<5&&<div className={`w-0.5 h-5 ${item.done?'bg-blue-200':'bg-gray-200'}`}/>}
                </div>
                <div className="pb-3 pt-1"><div className="text-xs text-gray-400">{item.t}</div><div className={`text-sm ${item.done?'text-gray-700':'text-gray-400'}`}>{item.e}</div></div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );

  const MyTasks=()=>(
    <div className="p-4 space-y-3">
      <h2 className="font-bold text-xl text-gray-800">My Tasks</h2>
      {myT.length===0&&<div className="text-center py-12 text-gray-300"><div className="text-5xl mb-2">📭</div><div className="text-gray-400">No tasks assigned</div></div>}
      {myT.map(t=>(
        <div key={t.id} className="bg-white rounded-2xl shadow-sm overflow-hidden">
          <div className={`px-4 py-2 flex items-center justify-between ${t.status==='Delivery Completed'?'bg-green-500':'bg-blue-600'}`}>
            <span className="text-white text-xs font-mono">{t.id}</span><Badge label={t.status}/>
          </div>
          <div className="p-4">
            <div className="font-semibold text-gray-800 mb-2">{t.customer}</div>
            <div className="text-xs text-gray-500 space-y-1 mb-3">
              <div><span className="text-green-500">↑</span> {t.pickup}</div>
              <div><span className="text-red-400">↓</span> {t.delivery}</div>
            </div>
            <div className="flex items-center justify-between">
              <div className="text-xs text-gray-400">ETA {t.eta} · {t.pkg}</div>
              {t.status!=='Delivery Completed'&&<button onClick={()=>setWfTask(t)} className="px-4 py-2 bg-blue-600 text-white rounded-xl text-sm font-bold hover:bg-blue-700">{t.status==='Assigned'?'Accept':'Continue'}</button>}
            </div>
          </div>
        </div>
      ))}
    </div>
  );

  const EmpAttendance=()=>{
    const week=[{d:'Monday',in:'09:28',out:'19:05',late:false},{d:'Tuesday',in:'09:35',out:'19:10',late:true},{d:'Wednesday',in:'09:25',out:'18:50',late:false},{d:'Thursday',in:'09:40',out:'19:15',late:true},{d:'Today',in:'09:28',out:'—',late:false}];
    return (
      <div className="p-4 space-y-4">
        <h2 className="font-bold text-xl text-gray-800">Attendance</h2>
        <p className="text-xs text-gray-400">16 June 2026 · Office: 09:30 – 19:00</p>
        <div className="bg-white rounded-2xl shadow-sm p-4">
          <div className="grid grid-cols-2 gap-3 mb-4">
            <div className="bg-green-50 rounded-xl p-3 text-center"><div className="text-xs text-gray-400">Check In</div><div className="font-bold text-green-600 text-xl">09:28 AM</div><div className="text-xs text-green-500">✅ On time</div></div>
            <div className="bg-gray-50 rounded-xl p-3 text-center"><div className="text-xs text-gray-400">Check Out</div><div className="font-bold text-gray-400 text-xl">—</div><div className="text-xs text-gray-400">Pending</div></div>
          </div>
          <div className="bg-blue-50 rounded-xl p-3 text-center"><div className="text-xs text-gray-400">Hours Worked Today</div><div className="font-bold text-blue-600 text-3xl">4h 52m</div><div className="text-xs text-gray-400 mt-1">📍 Location verified · Geofence OK</div></div>
        </div>
        <button className="w-full py-4 bg-red-500 text-white rounded-2xl font-bold hover:bg-red-600">🚪 Check Out</button>
        <div>
          <p className="text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">This Week</p>
          <div className="bg-white rounded-2xl shadow-sm overflow-hidden">
            {week.map((d,i)=>(
              <div key={i} className={`flex items-center px-4 py-3 gap-3 ${i<4?'border-b border-gray-50':''}`}>
                <span className="text-sm font-medium text-gray-700 w-24">{d.d}</span>
                <span className="text-green-600 text-xs">↑ {d.in}</span>
                <span className="text-gray-400 text-xs">↓ {d.out}</span>
                {d.late&&<Badge label="Late"/>}
              </div>
            ))}
          </div>
        </div>
      </div>
    );
  };

  const Profile=()=>(
    <div className="pb-4">
      <div className="bg-gradient-to-br from-blue-600 to-blue-900 p-6 text-white text-center">
        <div className="w-20 h-20 bg-white/20 rounded-2xl flex items-center justify-center text-3xl font-bold mx-auto mb-3">{me.avatar}</div>
        <div className="font-bold text-xl">{me.name}</div>
        <div className="text-blue-200 text-sm">{me.role}</div>
        <div className="text-blue-300 text-xs mt-1">{me.id}</div>
      </div>
      <div className="p-4 space-y-4">
        <div className="bg-white rounded-2xl shadow-sm p-4">
          {[['Department',me.dept],['Phone',me.phone],['Vehicle',me.vehicle||'—'],['Status',me.status]].map(([k,v])=>(
            <div key={k} className="flex justify-between items-center py-2.5 border-b border-gray-50 last:border-0 text-sm">
              <span className="text-gray-400">{k}</span>
              {k==='Status'?<Badge label={v}/>:<span className="font-medium text-gray-800">{v}</span>}
            </div>
          ))}
        </div>
        <div className="bg-white rounded-2xl shadow-sm p-4">
          <p className="text-xs font-bold text-gray-400 uppercase tracking-widest mb-3">This Month</p>
          <div className="grid grid-cols-3 gap-2 text-center">
            {[['87','Deliveries','text-blue-600'],['94%','On-time','text-green-600'],['4.9★','Rating','text-purple-600']].map(([v,l,c])=>(
              <div key={l} className="bg-gray-50 rounded-xl p-3"><div className={`text-xl font-bold ${c}`}>{v}</div><div className="text-xs text-gray-400">{l}</div></div>
            ))}
          </div>
        </div>
        <button className="w-full py-3 bg-blue-50 text-blue-600 rounded-xl text-sm font-semibold hover:bg-blue-100">🔑 Change PIN</button>
        <button onClick={onLogout} className="w-full py-3 border border-red-200 text-red-500 rounded-xl text-sm font-semibold hover:bg-red-50">🚪 Logout</button>
      </div>
    </div>
  );

  const nav=[{id:'home',i:'🏠',l:'Home'},{id:'tasks',i:'📋',l:'Tasks'},{id:'attendance',i:'🕐',l:'Attend.'},{id:'profile',i:'👤',l:'Profile'}];
  const content={home:<Home/>,tasks:<MyTasks/>,attendance:<EmpAttendance/>,profile:<Profile/>};

  return (
    <div className="flex items-center justify-center min-h-screen bg-slate-200">
      <div className="w-full max-w-sm bg-gray-50 flex flex-col shadow-2xl rounded-3xl overflow-hidden" style={{height:'844px'}}>
        <div className="flex-1 overflow-y-auto">{content[sec]||<Home/>}</div>
        <div className="bg-white border-t border-gray-100 px-2 py-2 flex justify-around flex-shrink-0">
          {nav.map(n=>(
            <button key={n.id} onClick={()=>setSec(n.id)} className={`flex flex-col items-center gap-0.5 px-3 py-1.5 rounded-xl transition-all relative ${sec===n.id?'text-blue-600':'text-gray-400 hover:text-gray-600'}`}>
              <span className="text-xl">{n.i}</span>
              <span className="text-xs font-medium">{n.l}</span>
              {n.id==='tasks'&&pending.length>0&&<span className="absolute top-0.5 right-1.5 w-4 h-4 bg-red-500 text-white text-xs rounded-full flex items-center justify-center font-bold">{pending.length}</span>}
              {sec===n.id&&<div className="absolute bottom-0 left-1/2 -translate-x-1/2 w-1 h-1 bg-blue-600 rounded-full"/>}
            </button>
          ))}
        </div>
      </div>
    </div>
  );
};

/* ─── ROOT ──────────────────────────────────────────────────── */
const App=()=>{
  const [page,setPage]=useState('login');
  const [role,setRole]=useState(null);
  const go=(r)=>{setRole(r);setPage(r==='admin'?'admin':'employee');};
  if(page==='login')    return <Login onLogin={go}/>;
  if(page==='admin')    return <Admin onLogout={()=>setPage('login')}/>;
  if(page==='employee') return <Employee onLogout={()=>setPage('login')}/>;
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
